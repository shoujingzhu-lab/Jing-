# ============================================================
# Quant Trading System — Production Docker Compose
# P1-005: 生产就绪多服务编排
#
# 启动: docker compose -f docker/docker-compose.prod.yml up -d
# 查看: docker compose -f docker/docker-compose.prod.yml ps
# ============================================================
version: "3.9"

x-common-env: &common-env
  APP_ENV: production
  LOG_FORMAT: json
  LOG_LEVEL: INFO

x-backend-env: &backend-env
  <<: *common-env
  DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/quant_trading
  TIMESCALE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@timescaledb:5432/quant_trading_ts
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2

services:
  # ============================================
  # PostgreSQL 主库 + 只读副本
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: quant-postgres
    environment:
      POSTGRES_DB: quant_trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ============================================
  # TimescaleDB 时序数据库
  # ============================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: quant-timescaledb
    environment:
      POSTGRES_DB: quant_trading_ts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ============================================
  # Redis 缓存 + 消息队列
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: quant-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ============================================
  # FastAPI 后端 (Gunicorn + Uvicorn workers)
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.prod
    container_name: quant-backend
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
      replicas: ${BACKEND_REPLICAS:-2}

  # ============================================
  # Celery Worker (异步任务执行)
  # ============================================
  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.prod
    container_name: quant-celery-worker
    command: >
      celery -A app.tasks worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=1000
      --time-limit=600
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../backend/logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
      replicas: ${CELERY_WORKER_REPLICAS:-2}

  # ============================================
  # Celery Beat (定时任务调度)
  # ============================================
  celery_beat:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.prod
    container_name: quant-celery-beat
    command: celery -A app.tasks beat --loglevel=info
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # Celery Flower (任务监控面板)
  # ============================================
  flower:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.prod
    container_name: quant-flower
    command: >
      celery -A app.tasks flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: quant-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ============================================
  # Prometheus 指标收集
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ============================================
  # Grafana 仪表盘
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  timescale_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
